<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>3D Quick Sort Visualization</title>

    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #ffffff;
        font-family: "Segoe UI", sans-serif;
        color: #000;
      }

      /* BACK BUTTON */
      .back-btn {
        position: fixed;
        top: 18px;
        left: 18px;
        font-size: 32px;
        color: #0077ff;
        text-decoration: none;
        font-weight: bold;
        z-index: 100;
      }

      /* HEADER */
      header {
        position: fixed;
        top: 0;
        width: 100%;
        height: 90px;
        background: #f5f7fa;
        border-bottom: 1px solid #ddd;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 50;
      }
      header .title {
        font-size: 28px;
        color: #0077ff;
        font-weight: bold;
      }
      header .subtitle {
        font-size: 14px;
        color: #555;
      }

      /* PANEL */
      #panel {
        position: fixed;
        top: 120px;
        left: 20px;
        width: 270px;
        background: #ffffff;
        border-radius: 14px;
        padding: 16px;
        color: #000;
        border: 1px solid #ddd;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        z-index: 40;
      }

      input,
      button {
        width: 100%;
        margin-top: 8px;
        padding: 8px;
        border-radius: 8px;
        border: 1px solid #ccc;
      }

      input {
        background: #f9f9f9;
        color: #000;
      }

      button {
        background: linear-gradient(135deg, #0077ff, #00aaff);
        color: #fff;
        font-weight: bold;
        cursor: pointer;
      }

      #status {
        margin-top: 12px;
        padding: 8px;
        text-align: center;
        background: #f1f3f6;
        color: #0077ff;
        border-radius: 8px;
        font-weight: bold;
      }

      /* CODE PANEL */
      #code {
        margin-top: 14px;
        background: #f8f9fc;
        color: #000;
        border-radius: 10px;
        padding: 10px;
        font-family: Consolas, monospace;
        border: 1px solid #ddd;
      }

      .active {
        background: #cceeff;
        font-weight: bold;
      }
      .flash-card {
        position: fixed;
        top: 140px;
        left: 380px;
        right: 60px;
        bottom: 60px;
        background: #fff;
        border-radius: 10px;
        border: 1px solid #ddd;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        z-index: 5;
      }

      button:disabled {
        background: #ccc;
        color: #666;
        cursor: not-allowed;
        opacity: 0.7;
      }

      /* Complexity box */
      #complexity {
        background: #ffffff;
        color: #000;
        padding: 10px;
        border-radius: 10px;
        z-index: 100;
        font-family: Consolas, monospace;
        font-size: 13px;
        min-width: 220px;
        border: 1px solid #ddd;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        position: absolute;
        bottom: 16px;
        right: 16px;
        z-index: 20;
      }

      #complexity table {
        width: 100%;
        border-collapse: collapse;
      }

      #complexity th {
        text-align: left;
        padding-bottom: 6px;
        color: #0077ff;
      }

      #complexity td {
        padding: 6px 8px;
      }

      #complexity .active {
        background: #e6f7ff;
        color: #0077ff;
        font-weight: 700;
        border-radius: 4px;
      }
    </style>
  </head>

  <body>
    <a href="index.html" class="back-btn">←</a>

    <header>
      <div class="title">Quick Sort</div>
      <div class="subtitle">3D Visualization with Code Execution</div>
      <div id="processingText" style="font-size: 14px; color: #ff8800"></div>
    </header>

    <div id="panel">
      <input id="arrayInput" value="5,3,8,4,2,7" />
      <button id="generateBtn" onclick="generate()">Generate</button>
      <button id="startBtn" onclick="start()" disabled>▶ Start</button>
      <button id="pauseBtn" onclick="pause()" disabled>⏸ Pause</button>
      <button id="resetBtn" onclick="reset()" disabled>🔄 Reset</button>

      <input id="speed" type="range" min="1" max="100" value="50" />
      <div id="status">Status: Ready</div>

      <div id="code">
        <div id="l1">quickSort(low, high)</div>
        <div id="l2">&nbsp;&nbsp;if (low &lt; high)</div>
        <div id="l3">&nbsp;&nbsp;&nbsp;&nbsp;p = partition()</div>
        <div id="l4">&nbsp;&nbsp;&nbsp;&nbsp;quickSort(low, p-1)</div>
        <div id="l5">&nbsp;&nbsp;&nbsp;&nbsp;quickSort(p+1, high)</div>
      </div>
    </div>
    <!-- Complexity table bottom-right -->
    <div class="flash-card" id="card">
      <div id="complexity">
        <table>
          <thead>
            <tr>
              <th>Case</th>
              <th>Time</th>
            </tr>
          </thead>
          <tbody>
            <tr id="bestRow">
              <td>Best</td>
              <td>O(n log n)</td>
            </tr>
            <tr id="avgRow">
              <td>Average</td>
              <td>O(n log n)</td>
            </tr>
            <tr id="worstRow">
              <td>Worst</td>
              <td>O(n²)</td>
            </tr>
            <tr id="spaceRow" class="neutral">
              <td>Space</td>
              <td>O(log n)</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

    <script>
      /* ---------- THREE ---------- */
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0xffffff);

      const camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.1,
        1000,
      );
      camera.position.set(0, 10, 18);
      camera.lookAt(0, 5, 0);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.domElement.style.position = "fixed";
      renderer.domElement.style.zIndex = "1";
      const card = document.getElementById("card");

      renderer.setSize(card.clientWidth, card.clientHeight);

      renderer.domElement.style.position = "absolute";
      renderer.domElement.style.top = "0";
      renderer.domElement.style.left = "0";
      renderer.domElement.style.zIndex = "1";
      renderer.domElement.style.pointerEvents = "none";

      card.appendChild(renderer.domElement);

      scene.add(new THREE.AmbientLight(0xffffff, 0.7));
      scene.add(new THREE.DirectionalLight(0xffffff, 1));

      const group = new THREE.Group();
      scene.add(group);
      /* ---------- ROTATION CONTROL ---------- */
      let mouseDown = false,
        lastX = 0,
        lastY = 0;
      let allowRotation = true;

      const panel = document.getElementById("panel");

      panel.addEventListener("mouseenter", () => (allowRotation = false));
      panel.addEventListener("mouseleave", () => (allowRotation = true));

      window.addEventListener("mousedown", (e) => {
        if (!allowRotation) return;
        mouseDown = true;
        lastX = e.clientX;
        lastY = e.clientY;
      });

      window.addEventListener("mouseup", () => (mouseDown = false));

      window.addEventListener("mousemove", (e) => {
        if (!mouseDown || !allowRotation) return;

        group.rotation.y += (e.clientX - lastX) * 0.005;
        group.rotation.x += (e.clientY - lastY) * 0.003;

        lastX = e.clientX;
        lastY = e.clientY;
      });

      /* ---------- DATA ---------- */
      let initiallySorted = false;
      let array = [],
        bars = [],
        labels = [];
      let steps = [],
        stepIndex = 0;
      let running = false,
        lastTime = 0;

      /* ---------- LABEL ---------- */
      function label(text) {
        const c = document.createElement("canvas");
        c.width = 256;
        c.height = 128;
        const ctx = c.getContext("2d");
        ctx.fillStyle = "#222";
        ctx.font = "bold 64px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(text, 128, 64);
        const t = new THREE.CanvasTexture(c);
        const s = new THREE.Sprite(new THREE.SpriteMaterial({ map: t }));
        s.scale.set(2.2, 1.1, 1);
        return s;
      }

      /* ---------- BOXES ---------- */
      function createBars() {
        group.clear();
        bars = [];
        labels = [];
        const spacing = 1.6;
        const max = Math.max(...array);
        array.forEach((v, i) => {
          const h = (v / max) * 8 + 0.5;
          const bar = new THREE.Mesh(
            new THREE.BoxGeometry(1, h, 1),
            new THREE.MeshStandardMaterial({ color: 0x0077ff }),
          );
          bar.position.set(
            i * spacing - ((array.length - 1) * spacing) / 2,
            h / 2,
            0,
          );
          const lb = label(v);
          lb.position.set(bar.position.x, -1.2, 0);
          bar.userData.label = lb;
          group.add(bar, lb);
          bars.push(bar);
          labels.push(lb);
        });
      }
      /* ---------- COMPLEXITY UI ---------- */
      function clearComplexity() {
        ["bestRow", "avgRow", "worstRow"].forEach((id) => {
          document.getElementById(id).classList.remove("active");
        });
      }

      function updateComplexity(state) {
        clearComplexity();

        if (state === "ready") {
          document.getElementById("avgRow").classList.add("active");
          return;
        }

        if (state === "running") {
          document.getElementById("avgRow").classList.add("active");
          return;
        }

        if (state === "completed") {
          document.getElementById("bestRow").classList.add("active");
        }
      }
      /* ---------- CODE HIGHLIGHT ---------- */
      let processingInterval;

      function startProcessingText() {
        const el = document.getElementById("processingText");
        let dots = 0;

        processingInterval = setInterval(() => {
          dots = (dots + 1) % 4;
          el.innerText = "Processing" + ".".repeat(dots);
        }, 400);
      }

      function stopProcessingText() {
        clearInterval(processingInterval);
        processingInterval = null;
        document.getElementById("processingText").innerText = "";
      }
      function hl(id) {
        ["l1", "l2", "l3", "l4", "l5"].forEach((x) => {
          document.getElementById(x).classList.remove("active");
        });
        if (id) document.getElementById(id).classList.add("active");
      }

      /* ---------- QUICK SORT STEPS ---------- */
      function buildSteps(arr, l, h) {
        if (l >= h) return;

        let pivot = arr[h],
          i = l;
        for (let j = l; j < h; j++) {
          steps.push({ t: "compare", i: j, p: h });
          if (arr[j] < pivot) {
            [arr[i], arr[j]] = [arr[j], arr[i]];
            steps.push({ t: "swap", a: i, b: j });
            i++;
          }
        }
        [arr[i], arr[h]] = [arr[h], arr[i]];
        steps.push({ t: "swap", a: i, b: h });
        steps.push({ t: "pivot", i });
        buildSteps(arr, l, i - 1);
        buildSteps(arr, i + 1, h);
      }

      /* ---------- STEP APPLY ---------- */
      function showResult() {
        let message = "";

        let timeComplexity = initiallySorted
          ? "O(n log n) (Best Case)"
          : "O(n log n)";

        message += "Sorting Completed!\n";

        // ✅ correct sorted array
        const sortedArray = [...array].sort((a, b) => a - b);
        message += `Sorted Array: ${sortedArray.join(", ")}\n`;

        message += `\nTime Complexity: ${timeComplexity}`;
        message += `\nSpace Complexity: O(log n)`;

        alert(message);
      }
      function applyStep() {
        bars.forEach((b) => b.material.color.set(0x0077ff));

        const s = steps[stepIndex++];

        if (!s) {
          bars.forEach((b) => b.material.color.set(0x00cc66));

          document.getElementById("status").innerText = "Sorting Completed";

          running = false;
          stopProcessingText();
          updateComplexity("completed");

          // ✅ SHOW ALERT
          setTimeout(() => showResult(), 300);

          return;
        }

        document.getElementById("status").innerText = "Sorting...";

        // STEP 1: entering recursion
        hl("l1");

        if (s.t === "compare") {
          hl("l3"); // partition step
          bars[s.i].material.color.set(0xffff00);
          bars[s.p].material.color.set(0xff00ff);
        }

        if (s.t === "swap") {
          hl("l3"); // still partition logic

          const a = bars[s.a],
            b = bars[s.b];

          [bars[s.a], bars[s.b]] = [bars[s.b], bars[s.a]];

          let x = a.position.x;
          a.position.x = b.position.x;
          b.position.x = x;

          let la = a.userData.label,
            lb = b.userData.label;

          let lx = la.position.x;
          la.position.x = lb.position.x;
          lb.position.x = lx;
        }

        if (s.t === "pivot") {
          hl("l4"); // left recursion
        }
      }

      /* ---------- CONTROLS ---------- */
      function showResult() {
        let message = "";

        let timeComplexity = initiallySorted
          ? "O(n log n) (Best Case)"
          : "O(n log n)";

        message += "Sorting Completed!\n";
        message += `Sorted Array: ${bars.map((b) => (b.userData.label.material.map ? "" : "")).length ? "" : ""}`;

        // better way:
        const sorted = bars.map((b) =>
          b.userData.label ? b.userData.label : null,
        );

        message = "Sorting Completed!\n";
        message += `Sorted Array: ${bars.map((b) => (b.userData.label ? "" : ""))}`;

        // ✅ Correct way (use original array sorted)
        message = "Sorting Completed!\n";
        message += `Sorted Array: ${array
          .slice()
          .sort((a, b) => a - b)
          .join(", ")}`;

        message += `\nTime Complexity: ${timeComplexity}`;
        message += `\nSpace Complexity: O(log n)`;

        alert(message);
      }
      function generate() {
        running = false;
        stepIndex = 0;
        steps = [];

        const raw = document
          .getElementById("arrayInput")
          .value.split(",")
          .map(Number);

        if (raw.length === 0 || raw.some(isNaN)) {
          alert("Enter valid numbers!");
          return;
        }

        if (raw.length > 10) {
          alert("Maximum 10 elements allowed!");
          return;
        }

        array = raw;
        initiallySorted =
          array.length <= 1 ||
          array.every((v, i) => i === 0 || array[i] >= array[i - 1]);
        createBars();
        buildSteps([...array], 0, array.length - 1);

        hl("l1");

        document.getElementById("status").innerText =
          "Click Start to begin sorting";

        updateComplexity("ready");

        // ✅ ENABLE
        document.getElementById("startBtn").disabled = false;
        document.getElementById("pauseBtn").disabled = false;
        document.getElementById("resetBtn").disabled = false;
        document.getElementById("generateBtn").disabled = true;
      }
      function start() {
        running = true;
        startProcessingText();
        updateComplexity("running");
      }

      function pause() {
        running = false;
        stopProcessingText();
        updateComplexity("ready");
      }

      function reset() {
        running = false;
        stopProcessingText();

        group.clear();
        bars = [];
        labels = [];
        steps = [];
        stepIndex = 0;

        document.getElementById("status").innerText =
          "Enter array and click Generate";

        document.getElementById("startBtn").disabled = true;
        document.getElementById("pauseBtn").disabled = true;
        document.getElementById("resetBtn").disabled = true;
        document.getElementById("generateBtn").disabled = false;
      }
      /* ---------- LOOP ---------- */
      function animate(t) {
        requestAnimationFrame(animate);
        if (running) {
          const delay = 2100 - document.getElementById("speed").value * 20;
          if (t - lastTime > delay) {
            applyStep();
            lastTime = t;
          }
        }
        labels.forEach((l) => l.lookAt(camera.position));
        renderer.render(scene, camera);
      }
      animate();

      window.addEventListener("resize", () => {
        const card = document.getElementById("card");

        camera.aspect = card.clientWidth / card.clientHeight;
        camera.updateProjectionMatrix();

        renderer.setSize(card.clientWidth, card.clientHeight);
      });
      window.onload = function () {
        running = false;

        document.getElementById("startBtn").disabled = true;
        document.getElementById("pauseBtn").disabled = true;
        document.getElementById("resetBtn").disabled = true;

        document.getElementById("status").innerText =
          "Enter array and click Generate";
      };
    </script>
  </body>
</html>
